name: Sync to Hugging Face Space
on:
  push:
    branches: [main] # Or master, depending on your branch name

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Remove ALL binary files that Hugging Face rejects
          find . -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.gif" -o -name "*.pdf" -o -name "*.wav" -o -name "*.mp4" -o -name "*.mp3" -o -name "*.webm" \) -exec rm -f {} +
          rm -rf docs/ infographic/ website/ landingpage/
          
          # 2. Inject Hugging Face Configuration into README.md
          echo -e "---\ntitle: Hermes Agent\nemoji: 🤖\ncolorFrom: blue\ncolorTo: purple\nsdk: docker\napp_port: 8000\n---\n$(cat README.md)" > README.md
          
          # 3. Wipe Git history to prevent old binaries from being pushed
          rm -rf .git
          git init
          git checkout -b main
          git config user.email "bot@example.com"
          git config user.name "Deploy Bot"
          
          # 4. Create a fresh, single commit and force push it
          git add .
          git commit -m "Deploy to Hugging Face"
          git push --force https://faturismee:$HF_TOKEN@huggingface.co/spaces/faturismee/myaiagent main