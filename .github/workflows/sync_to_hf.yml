name: Sync to Hugging Face Space
on:
  push:
    branches: [main] # Or master, depending on your branch name

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Remove binary directories that Hugging Face rejects
          rm -rf docs/ infographic/ website/ assets/ landingpage/
          rm -rf plugins/hermes-achievements/docs/
          rm -rf skills/research/research-paper-writing/templates/
          rm -rf tools/neutts_samples/
          
          # 2. Wipe Git history to prevent old binaries from being pushed
          rm -rf .git
          git init
          git checkout -b main
          git config user.email "bot@example.com"
          git config user.name "Deploy Bot"
          
          # 3. Create a fresh, single commit and force push it
          git add .
          git commit -m "Deploy to Hugging Face"
          git push --force https://faturismee:$HF_TOKEN@huggingface.co/spaces/faturismee/myaiagent main